<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dixit Online</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Alegreya+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#1a1520;--bg2:#241e2e;--surface:#2d2636;--surface2:#382f44;
--gold:#d4a843;--gold2:#f0c95a;--text:#e8e0f0;--text2:#a89cb8;
--accent:#6b4c9a;--accent2:#8b6cc0;--red:#c0392b;--green:#27ae60;
--card-w:110px;--card-h:165px;
}
body{font-family:'Crimson Text',serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,.logo{font-family:'Alegreya SC',serif}

/* Screens */
.screen{display:none;min-height:100vh;padding:20px}
.screen.active{display:flex;flex-direction:column;align-items:center}

/* Title Screen */
.title-screen{justify-content:center;gap:30px;text-align:center;background:radial-gradient(ellipse at center,#2d1f3d 0%,var(--bg) 70%)}
.logo{font-size:4em;color:var(--gold);text-shadow:0 0 40px rgba(212,168,67,0.3);letter-spacing:4px}
.subtitle{color:var(--text2);font-size:1.2em;font-style:italic;margin-top:-15px}

/* Buttons */
.btn{font-family:'Alegreya SC',serif;background:linear-gradient(135deg,var(--accent),var(--accent2));
color:var(--text);border:none;padding:14px 36px;font-size:1.1em;border-radius:8px;cursor:pointer;
transition:all .2s;letter-spacing:1px}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(107,76,154,0.4)}
.btn:active{transform:translateY(0)}
.btn.gold{background:linear-gradient(135deg,var(--gold),#b8912e)}
.btn.sm{padding:8px 18px;font-size:.9em}
.btn:disabled{opacity:.5;cursor:default;transform:none}

/* Input */
input[type=text]{font-family:'Crimson Text',serif;background:var(--surface);border:2px solid var(--surface2);
color:var(--text);padding:12px 18px;font-size:1.1em;border-radius:8px;outline:none;width:100%;max-width:300px}
input:focus{border-color:var(--accent)}

/* Lobby */
.lobby{gap:20px;padding-top:40px}
.room-code{font-family:'Alegreya SC',serif;font-size:2.5em;color:var(--gold);letter-spacing:8px;
background:var(--surface);padding:15px 40px;border-radius:12px;border:2px solid var(--gold)}
.player-list{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:20px 0}
.player-chip{background:var(--surface2);padding:8px 20px;border-radius:20px;display:flex;align-items:center;gap:8px}
.player-dot{width:10px;height:10px;border-radius:50%}
.player-colors{background:#e74c3c;}.p1{background:#e74c3c}.p2{background:#3498db}.p3{background:#2ecc71}.p4{background:#f39c12}.p5{background:#9b59b6}.p6{background:#1abc9c}

/* Game Board */
.game-screen{padding:10px;gap:8px}
.top-bar{width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;
padding:8px 16px;background:var(--surface);border-radius:10px}
.scores{display:flex;gap:12px;flex-wrap:wrap}
.score-item{display:flex;align-items:center;gap:6px;font-size:.9em}
.phase-label{color:var(--gold);font-family:'Alegreya SC',serif;font-size:1.1em}

/* Clue area */
.clue-area{width:100%;max-width:900px;text-align:center;padding:12px;background:var(--surface);
border-radius:10px;min-height:60px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.clue-text{font-size:1.4em;font-style:italic;color:var(--gold2)}
.clue-input{display:flex;gap:10px;align-items:center;width:100%;justify-content:center}

/* Card display areas */
.table-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:10px;
width:100%;max-width:900px}
.hand-area{width:100%;max-width:900px;background:var(--surface);border-radius:12px;padding:12px}
.hand-label{color:var(--text2);font-size:.85em;margin-bottom:8px;text-align:center}
.hand-cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* Cards */
.card{width:var(--card-w);height:var(--card-h);border-radius:8px;overflow:hidden;cursor:pointer;
transition:all .25s;position:relative;flex-shrink:0;border:3px solid transparent}
.card img{width:100%;height:100%;object-fit:cover}
.card:hover{transform:translateY(-8px);box-shadow:0 8px 25px rgba(0,0,0,0.5)}
.card.selected{border-color:var(--gold);transform:translateY(-10px);box-shadow:0 10px 30px rgba(212,168,67,0.4)}
.card.disabled{cursor:default;opacity:.7}.card.disabled:hover{transform:none;box-shadow:none}
.card-overlay{position:absolute;bottom:0;left:0;right:0;padding:4px;text-align:center;
background:rgba(0,0,0,0.7);font-size:.75em;color:var(--gold)}
.card.voted .card-overlay{background:rgba(39,174,96,0.8)}
.card-votes{position:absolute;top:5px;right:5px;background:var(--accent);color:white;
border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.75em}
.card.storyteller-card{border-color:var(--gold);box-shadow:0 0 15px rgba(212,168,67,0.5)}

/* Results overlay */
.results-panel{width:100%;max-width:900px;background:var(--surface);border-radius:12px;padding:20px;text-align:center}
.results-panel h3{color:var(--gold);margin-bottom:15px}
.result-row{display:flex;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--surface2)}
.result-row.header{color:var(--gold);font-weight:bold}
.round-msg{font-size:1.1em;color:var(--gold2);margin:10px 0;font-style:italic}

/* Waiting */
.waiting{color:var(--text2);font-style:italic;padding:20px;text-align:center}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--surface2);
border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Winner screen */
.winner-screen{justify-content:center;gap:30px;text-align:center}
.winner-name{font-size:3em;color:var(--gold);font-family:'Alegreya SC',serif}
.final-scores{background:var(--surface);border-radius:12px;padding:20px;min-width:300px}

/* Status toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);
color:white;padding:10px 24px;border-radius:8px;font-size:.95em;z-index:100;opacity:0;
transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:600px){
  :root{--card-w:80px;--card-h:120px}
  .logo{font-size:2.5em}
  .room-code{font-size:1.8em;padding:10px 25px}
  .btn{padding:10px 24px;font-size:1em}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- Title Screen -->
<div class="screen title-screen active" id="titleScreen">
  <div class="logo">Dixit</div>
  <div class="subtitle">A game of creative storytelling</div>
  <input type="text" id="nameInput" placeholder="Your name..." maxlength="15" style="text-align:center">
  <div style="display:flex;gap:15px;flex-wrap:wrap;justify-content:center">
    <button class="btn gold" onclick="createGame()">Create Game</button>
    <button class="btn" onclick="showJoin()">Join Game</button>
  </div>
  <div id="joinArea" style="display:none;margin-top:10px;display:flex;flex-direction:column;align-items:center;gap:10px">
    <input type="text" id="codeInput" placeholder="Room code..." maxlength="6" style="text-align:center;text-transform:uppercase">
    <button class="btn sm" onclick="joinGame()">Enter Room</button>
  </div>
</div>

<!-- Lobby Screen -->
<div class="screen lobby" id="lobbyScreen">
  <h2 style="color:var(--text2)">Game Lobby</h2>
  <div class="room-code" id="roomCodeDisplay"></div>
  <div style="color:var(--text2);font-size:.9em">Share this code with friends to join</div>
  <div class="player-list" id="playerList"></div>
  <div id="lobbyStatus" style="color:var(--text2)"></div>
  <button class="btn gold" id="startBtn" onclick="startGame()" style="display:none">Start Game</button>
</div>

<!-- Game Screen -->
<div class="screen game-screen" id="gameScreen">
  <div class="top-bar">
    <div class="scores" id="scoreBoard"></div>
    <div class="phase-label" id="phaseLabel"></div>
  </div>
  <div class="clue-area" id="clueArea"></div>
  <div class="table-cards" id="tableCards"></div>
  <div id="resultsArea"></div>
  <div class="hand-area" id="handArea">
    <div class="hand-label">Your Hand</div>
    <div class="hand-cards" id="handCards"></div>
  </div>
</div>

<!-- Winner Screen -->
<div class="screen winner-screen" id="winnerScreen">
  <div style="font-size:1.2em;color:var(--text2)">Game Over!</div>
  <div class="winner-name" id="winnerName"></div>
  <div style="color:var(--text2)">wins!</div>
  <div class="final-scores" id="finalScores"></div>
  <button class="btn gold" onclick="location.reload()">Play Again</button>
</div>

function cardImg(id){return 'data:image/jpeg;base64,'+CARD_DATA[id]}
function backImg(){return 'data:image/jpeg;base64,'+CARD_DATA['back']}

// ===== STATE =====
let S = null; // shared game state
let myId = null;
let myName = '';
let roomCode = '';
let pollTimer = null;
const POLL_MS = 1500;
const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
const WIN_SCORE = 30;

// ===== STORAGE HELPERS =====
async function save(key, val){
  try{return await window.storage.set(key, JSON.stringify(val), true)}catch(e){console.error('save err',e);return null}
}
async function load(key){
  try{const r=await window.storage.get(key, true);return r?JSON.parse(r.value):null}catch(e){return null}
}

// ===== TOAST =====
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== SCREENS =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== TITLE =====
function showJoin(){
  const a=document.getElementById('joinArea');
  a.style.display=a.style.display==='none'?'flex':'none';
}

// ===== CREATE GAME =====
async function createGame(){
  myName=document.getElementById('nameInput').value.trim();
  if(!myName){toast('Enter your name first');return}
  roomCode=Math.random().toString(36).substr(2,5).toUpperCase();
  myId='p_'+Date.now();
  
  // Shuffle deck
  const deck=[];for(let i=1;i<=84;i++)deck.push(i);
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]]}
  
  S={
    phase:'lobby', // lobby, clue, play, vote, reveal, gameover
    players:[{id:myId,name:myName,score:0,hand:[],isHost:true}],
    deck:deck,
    storytellerIdx:0,
    clue:'',
    storytellerCard:null,
    playedCards:[], // {playerId, cardId}
    votes:{}, // {voterId: cardIndex}
    roundResults:null,
    turnNumber:0
  };
  await save('dixit-'+roomCode, S);
  
  document.getElementById('roomCodeDisplay').textContent=roomCode;
  showScreen('lobbyScreen');
  startPolling();
  renderLobby();
}

// ===== JOIN GAME =====
async function joinGame(){
  myName=document.getElementById('nameInput').value.trim();
  if(!myName){toast('Enter your name first');return}
  roomCode=(document.getElementById('codeInput').value||'').trim().toUpperCase();
  if(!roomCode){toast('Enter a room code');return}
  
  S=await load('dixit-'+roomCode);
  if(!S){toast('Room not found');return}
  if(S.phase!=='lobby'){toast('Game already in progress');return}
  if(S.players.length>=6){toast('Room is full');return}
  if(S.players.find(p=>p.name===myName)){toast('Name taken');return}
  
  myId='p_'+Date.now();
  S.players.push({id:myId,name:myName,score:0,hand:[],isHost:false});
  await save('dixit-'+roomCode, S);
  
  document.getElementById('roomCodeDisplay').textContent=roomCode;
  showScreen('lobbyScreen');
  startPolling();
  renderLobby();
}

// ===== LOBBY =====
function renderLobby(){
  const pl=document.getElementById('playerList');
  pl.innerHTML=S.players.map((p,i)=>
    `<div class="player-chip"><div class="player-dot" style="background:${COLORS[i]}"></div>${p.name}${p.isHost?' (Host)':''}</div>`
  ).join('');
  
  const isHost=S.players.find(p=>p.id===myId)?.isHost;
  const startBtn=document.getElementById('startBtn');
  startBtn.style.display=isHost&&S.players.length>=3?'block':'none';
  
  document.getElementById('lobbyStatus').textContent=
    S.players.length<3?`Need ${3-S.players.length} more player(s) to start`:`${S.players.length} players ready`;
}

// ===== START GAME =====
async function startGame(){
  if(S.players.length<3){toast('Need at least 3 players');return}
  
  // Deal 6 cards to each player
  S.players.forEach(p=>{
    p.hand=[];
    for(let i=0;i<6;i++){
      if(S.deck.length)p.hand.push(S.deck.pop());
    }
  });
  
  S.phase='clue';
  S.storytellerIdx=0;
  S.turnNumber=1;
  S.clue='';
  S.storytellerCard=null;
  S.playedCards=[];
  S.votes={};
  S.roundResults=null;
  
  await save('dixit-'+roomCode, S);
}

// ===== POLLING =====
function startPolling(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    const newS=await load('dixit-'+roomCode);
    if(!newS)return;
    const oldPhase=S?S.phase:null;
    S=newS;
    render();
  }, POLL_MS);
}

// ===== RENDER =====
function render(){
  if(!S)return;
  if(S.phase==='lobby'){showScreen('lobbyScreen');renderLobby();return}
  if(S.phase==='gameover'){showScreen('winnerScreen');renderWinner();return}
  
  showScreen('gameScreen');
  renderScoreboard();
  renderPhase();
  renderClueArea();
  renderTable();
  renderHand();
  renderResults();
}

function me(){return S.players.find(p=>p.id===myId)}
function storyteller(){return S.players[S.storytellerIdx]}
function amStoryteller(){return storyteller()?.id===myId}

function renderScoreboard(){
  document.getElementById('scoreBoard').innerHTML=S.players.map((p,i)=>
    `<div class="score-item"><div class="player-dot" style="background:${COLORS[i]}"></div>
    <span style="${p.id===storyteller()?.id?'color:var(--gold);font-weight:bold':''}">${p.name}: ${p.score}</span></div>`
  ).join('');
}

function renderPhase(){
  const labels={clue:'Storyteller\'s Turn',play:'Choose a Card',vote:'Vote!',reveal:'Results'};
  document.getElementById('phaseLabel').textContent=`Round ${S.turnNumber} · ${labels[S.phase]||''}`;
}

function renderClueArea(){
  const area=document.getElementById('clueArea');
  const st=storyteller();
  
  if(S.phase==='clue'){
    if(amStoryteller()){
      area.innerHTML=`<div style="color:var(--text2)">You are the storyteller! Select a card and give a clue.</div>
        <div class="clue-input">
          <input type="text" id="clueInput" placeholder="Enter your clue..." maxlength="100">
          <button class="btn sm gold" onclick="submitClue()">Submit</button>
        </div>`;
    } else {
      area.innerHTML=`<div class="waiting"><span class="spinner"></span>${st?.name} is choosing a card and writing a clue...</div>`;
    }
  } else if(S.phase==='play'){
    if(amStoryteller()){
      const done=S.playedCards.length;
      const needed=S.players.length-1;
      area.innerHTML=`<div class="clue-text">"${S.clue}"</div>
        <div class="waiting"><span class="spinner"></span>Waiting for players to choose cards (${done}/${needed})</div>`;
    } else {
      const hasPlayed=S.playedCards.some(c=>c.playerId===myId);
      if(hasPlayed){
        area.innerHTML=`<div class="clue-text">"${S.clue}"</div>
          <div class="waiting"><span class="spinner"></span>Waiting for other players...</div>`;
      } else {
        area.innerHTML=`<div class="clue-text">"${S.clue}"</div>
          <div style="color:var(--text2)">Choose a card from your hand that matches this clue</div>`;
      }
    }
  } else if(S.phase==='vote'){
    const hasVoted=S.votes[myId]!==undefined;
    const votesIn=Object.keys(S.votes).length;
    const needed=S.players.length-1;
    if(amStoryteller()){
      area.innerHTML=`<div class="clue-text">"${S.clue}"</div>
        <div class="waiting"><span class="spinner"></span>Players are voting (${votesIn}/${needed})</div>`;
    } else if(hasVoted){
      area.innerHTML=`<div class="clue-text">"${S.clue}"</div>
        <div class="waiting"><span class="spinner"></span>Vote submitted! Waiting... (${votesIn}/${needed})</div>`;
    } else {
      area.innerHTML=`<div class="clue-text">"${S.clue}"</div>
        <div style="color:var(--text2)">Which card is the storyteller's? Tap to vote!</div>`;
    }
  } else if(S.phase==='reveal'){
    area.innerHTML=`<div class="clue-text">"${S.clue}"</div>`;
  }
}

function renderTable(){
  const tc=document.getElementById('tableCards');
  tc.innerHTML='';
  
  if(S.phase==='vote'){
    // Show shuffled played cards face-up for voting
    S.playedCards.forEach((pc,idx)=>{
      const hasVoted=S.votes[myId]!==undefined;
      const canVote=!amStoryteller()&&!hasVoted&&pc.playerId!==myId;
      const myVote=S.votes[myId]===idx;
      const div=document.createElement('div');
      div.className=`card ${myVote?'selected':''} ${canVote?'':'disabled'}`;
      div.innerHTML=`<img src="${cardImg(pc.cardId)}"><div class="card-overlay">${idx+1}</div>`;
      if(canVote)div.onclick=()=>submitVote(idx);
      tc.appendChild(div);
    });
  } else if(S.phase==='reveal'&&S.roundResults){
    S.playedCards.forEach((pc,idx)=>{
      const player=S.players.find(p=>p.id===pc.playerId);
      const isST=pc.playerId===storyteller()?.id;
      const votesForThis=Object.values(S.votes).filter(v=>v===idx).length;
      const div=document.createElement('div');
      div.className=`card ${isST?'storyteller-card':''}`;
      div.style.cursor='default';
      div.innerHTML=`<img src="${cardImg(pc.cardId)}">
        <div class="card-overlay">${player?.name||'?'}${isST?' ★':''}</div>
        ${votesForThis?`<div class="card-votes">${votesForThis}</div>`:''}`;
      tc.appendChild(div);
    });
  } else if(S.phase==='play'){
    // Show card backs for played cards
    const count=S.playedCards.length;
    for(let i=0;i<count;i++){
      const div=document.createElement('div');
      div.className='card disabled';
      div.innerHTML=`<img src="${backImg()}">`;
      tc.appendChild(div);
    }
  }
}

function renderHand(){
  const ha=document.getElementById('handArea');
  const hc=document.getElementById('handCards');
  const player=me();
  if(!player){ha.style.display='none';return}
  ha.style.display='block';
  hc.innerHTML='';
  
  const hand=player.hand||[];
  hand.forEach(cardId=>{
    const div=document.createElement('div');
    const canSelect=(S.phase==='clue'&&amStoryteller())||
      (S.phase==='play'&&!amStoryteller()&&!S.playedCards.some(c=>c.playerId===myId));
    div.className=`card ${canSelect?'':'disabled'}`;
    div.innerHTML=`<img src="${cardImg(cardId)}">`;
    if(canSelect)div.onclick=()=>selectHandCard(cardId);
    hc.appendChild(div);
  });
}

function renderResults(){
  const ra=document.getElementById('resultsArea');
  if(S.phase!=='reveal'||!S.roundResults){ra.innerHTML='';return}
  
  const rr=S.roundResults;
  let msg='';
  if(rr.allOrNone){
    msg='Everyone (or no one) found the storyteller\'s card! Storyteller gets 0, everyone else gets 2.';
  } else {
    const guessers=rr.correctGuessers||[];
    msg=guessers.length?`${guessers.join(', ')} found the right card!`:'';
  }
  
  ra.innerHTML=`<div class="results-panel">
    <h3>Round Results</h3>
    <div class="round-msg">${msg}</div>
    ${rr.scores.map(s=>`<div class="result-row"><span>${s.name}</span><span>+${s.gained} (${s.total})</span></div>`).join('')}
    <div style="margin-top:15px">
      ${amStoryteller()?'<button class="btn gold sm" onclick="nextRound()">Next Round</button>':
        '<div class="waiting"><span class="spinner"></span>Waiting for storyteller to continue...</div>'}
    </div>
  </div>`;
}

function renderWinner(){
  const sorted=[...S.players].sort((a,b)=>b.score-a.score);
  document.getElementById('winnerName').textContent=sorted[0].name;
  document.getElementById('finalScores').innerHTML=sorted.map((p,i)=>
    `<div class="result-row"><span>${i+1}. ${p.name}</span><span>${p.score} pts</span></div>`
  ).join('');
}

// ===== ACTIONS =====
let selectedCard=null;

function selectHandCard(cardId){
  if(S.phase==='clue'&&amStoryteller()){
    selectedCard=cardId;
    // Highlight it
    document.querySelectorAll('.hand-cards .card').forEach(c=>{
      const img=c.querySelector('img');
      c.classList.toggle('selected',img.src===cardImg(cardId));
    });
  } else if(S.phase==='play'&&!amStoryteller()){
    playCard(cardId);
  }
}

async function submitClue(){
  if(!amStoryteller())return;
  const clue=document.getElementById('clueInput')?.value?.trim();
  if(!clue){toast('Enter a clue!');return}
  if(!selectedCard){toast('Select a card first!');return}
  
  S.clue=clue;
  S.storytellerCard=selectedCard;
  S.playedCards=[{playerId:myId,cardId:selectedCard}];
  
  // Remove from hand
  const player=me();
  player.hand=player.hand.filter(c=>c!==selectedCard);
  
  S.phase='play';
  selectedCard=null;
  await save('dixit-'+roomCode, S);
  render();
}

async function playCard(cardId){
  if(S.playedCards.some(c=>c.playerId===myId))return;
  
  S.playedCards.push({playerId:myId,cardId});
  const player=me();
  player.hand=player.hand.filter(c=>c!==cardId);
  
  // Check if all non-storyteller players have played
  if(S.playedCards.length===S.players.length){
    // Shuffle played cards
    for(let i=S.playedCards.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [S.playedCards[i],S.playedCards[j]]=[S.playedCards[j],S.playedCards[i]];
    }
    S.phase='vote';
  }
  
  await save('dixit-'+roomCode, S);
  render();
}

async function submitVote(idx){
  if(amStoryteller()||S.votes[myId]!==undefined)return;
  // Can't vote for own card
  if(S.playedCards[idx].playerId===myId){toast("Can't vote for your own card!");return}
  
  S.votes[myId]=idx;
  
  // Check if all non-storyteller players have voted
  const nonSTPlayers=S.players.filter(p=>p.id!==storyteller().id);
  const allVoted=nonSTPlayers.every(p=>S.votes[p.id]!==undefined);
  
  if(allVoted){
    calculateScores();
    S.phase='reveal';
  }
  
  await save('dixit-'+roomCode, S);
  render();
}

function calculateScores(){
  const stIdx=S.playedCards.findIndex(c=>c.playerId===storyteller().id);
  const nonST=S.players.filter(p=>p.id!==storyteller().id);
  
  // Count votes for storyteller's card
  const stVotes=Object.values(S.votes).filter(v=>v===stIdx).length;
  const allGuessed=stVotes===nonST.length;
  const noneGuessed=stVotes===0;
  const allOrNone=allGuessed||noneGuessed;
  
  const results={allOrNone,scores:[],correctGuessers:[]};
  
  if(allOrNone){
    // Storyteller gets 0, everyone else gets 2
    S.players.forEach(p=>{
      const gained=p.id===storyteller().id?0:2;
      p.score+=gained;
      results.scores.push({name:p.name,gained,total:p.score});
    });
  } else {
    // Storyteller and correct guessers get 3
    const st=storyteller();
    st.score+=3;
    
    nonST.forEach(p=>{
      if(S.votes[p.id]===stIdx){
        p.score+=3;
        results.correctGuessers.push(p.name);
      }
    });
    
    results.scores.push({name:st.name,gained:3,total:st.score});
  }
  
  // Bonus: non-storyteller players get 1 point per vote on their card
  if(!allOrNone){
    nonST.forEach(p=>{
      const myCardIdx=S.playedCards.findIndex(c=>c.playerId===p.id);
      const votesOnMyCard=Object.values(S.votes).filter(v=>v===myCardIdx).length;
      if(votesOnMyCard>0){
        p.score+=votesOnMyCard;
      }
    });
  }
  
  // Rebuild scores list
  results.scores=S.players.map(p=>{
    const oldScore=results.scores.find(s=>s.name===p.name);
    if(oldScore)return oldScore;
    const myCardIdx=S.playedCards.findIndex(c=>c.playerId===p.id);
    const votesOnMyCard=allOrNone?0:Object.values(S.votes).filter(v=>v===myCardIdx).length;
    const guessedRight=!allOrNone&&S.votes[p.id]===stIdx?3:0;
    const gained=(allOrNone&&p.id!==storyteller().id?2:0)+guessedRight+votesOnMyCard;
    return{name:p.name,gained,total:p.score};
  });
  
  S.roundResults=results;
}

async function nextRound(){
  // Check for winner
  const winner=S.players.find(p=>p.score>=WIN_SCORE);
  if(winner||S.deck.length<S.players.length){
    S.phase='gameover';
    await save('dixit-'+roomCode, S);
    render();
    return;
  }
  
  // Deal 1 new card to each player
  S.players.forEach(p=>{
    if(S.deck.length)p.hand.push(S.deck.pop());
  });
  
  // Next storyteller
  S.storytellerIdx=(S.storytellerIdx+1)%S.players.length;
  S.turnNumber++;
  S.clue='';
  S.storytellerCard=null;
  S.playedCards=[];
  S.votes={};
  S.roundResults=null;
  S.phase='clue';
  
  await save('dixit-'+roomCode, S);
  render();
}

// Init
document.getElementById('joinArea').style.display='none';
</script>
